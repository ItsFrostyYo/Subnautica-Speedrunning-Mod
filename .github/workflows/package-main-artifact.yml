name: Package Main Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build launcher stack
        run: .\Launcher\build.ps1

      - name: Publish launcher outputs
        run: |
          $stagingRoot = Join-Path $env:RUNNER_TEMP "SubnauticaSpeedrunningRanked"
          .\Launcher\publish-to-game.ps1 -GameRoot $stagingRoot -TransportRoot $env:RUNNER_TEMP

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubnauticaSpeedrunningRanked-main
          path: ${{ runner.temp }}\SubnauticaSpeedrunningRanked
